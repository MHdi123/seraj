{% extends "base.html" %}

{% block title %}بازنشانی رمز عبور - سِراج{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- هدر گرادینت -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-6 py-8 text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white/20 rounded-full mb-4">
                <i class="fas fa-key text-white text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white">بازنشانی رمز عبور</h2>
            <p class="text-blue-100 mt-2">رمز عبور جدید خود را وارد کنید</p>
        </div>

        <div class="p-6">
            <form method="POST" id="resetForm" action="{{ url_for('reset_password', token=token) }}">
                <!-- فیلد رمز عبور جدید -->
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">رمز عبور جدید</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" 
                               class="w-full px-4 py-3 pr-12 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                               placeholder="حداقل ۶ کاراکتر"
                               minlength="6"
                               required>
                        <button type="button" id="togglePassword" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                    <!-- نشانگر قدرت رمز -->
                    <div class="mt-2">
                        <div class="flex gap-1">
                            <div id="strengthBar1" class="h-1 flex-1 rounded-full bg-gray-200"></div>
                            <div id="strengthBar2" class="h-1 flex-1 rounded-full bg-gray-200"></div>
                            <div id="strengthBar3" class="h-1 flex-1 rounded-full bg-gray-200"></div>
                        </div>
                        <p id="strengthText" class="text-xs mt-1 text-gray-500">قدرت رمز: وارد کنید</p>
                    </div>
                </div>

                <!-- فیلد تکرار رمز عبور -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">تکرار رمز عبور جدید</label>
                    <div class="relative">
                        <input type="password" id="confirm_password" name="confirm_password" 
                               class="w-full px-4 py-3 pr-12 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                               placeholder="رمز عبور را مجدداً وارد کنید"
                               minlength="6"
                               required>
                        <button type="button" id="toggleConfirmPassword" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                    <p id="matchError" class="text-xs text-red-500 mt-1 hidden">رمز عبور و تکرار آن مطابقت ندارند</p>
                </div>

                <!-- دکمه ارسال -->
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all transform hover:scale-[1.02] flex items-center justify-center gap-2">
                    <i class="fas fa-sync-alt"></i>
                    تغییر رمز عبور
                </button>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm_password');
    const matchError = document.getElementById('matchError');
    const submitBtn = document.getElementById('submitBtn');
    
    // عناصر نمایش قدرت رمز
    const strengthBars = [
        document.getElementById('strengthBar1'),
        document.getElementById('strengthBar2'),
        document.getElementById('strengthBar3')
    ];
    const strengthText = document.getElementById('strengthText');

    // توابع کمکی
    function checkPasswordStrength(pwd) {
        let score = 0;
        if (pwd.length >= 6) score++;
        if (pwd.length >= 10) score++;
        if (/[A-Z]/.test(pwd)) score++;
        if (/[0-9]/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;
        
        // محدود کردن نمره به 3 برای نمایش
        let level = Math.min(Math.floor(score / 2), 3);
        if (pwd.length === 0) level = 0;
        
        // رنگ‌ها و متن
        const colors = ['bg-gray-200', 'bg-red-500', 'bg-yellow-500', 'bg-green-500'];
        const texts = ['', 'ضعیف', 'متوسط', 'قوی'];
        
        for (let i = 0; i < strengthBars.length; i++) {
            strengthBars[i].className = `h-1 flex-1 rounded-full ${i < level ? colors[level] : 'bg-gray-200'}`;
        }
        if (pwd.length > 0) {
            strengthText.innerHTML = `قدرت رمز: ${texts[level]}`;
            strengthText.className = `text-xs mt-1 ${level === 1 ? 'text-red-500' : (level === 2 ? 'text-yellow-600' : 'text-green-600')}`;
        } else {
            strengthText.innerHTML = 'قدرت رمز: وارد کنید';
            strengthText.className = 'text-xs mt-1 text-gray-500';
        }
        return level;
    }

    function validateMatch() {
        if (password.value !== confirmPassword.value) {
            matchError.classList.remove('hidden');
            confirmPassword.classList.add('border-red-500', 'ring-1', 'ring-red-500');
            return false;
        } else {
            matchError.classList.add('hidden');
            confirmPassword.classList.remove('border-red-500', 'ring-1', 'ring-red-500');
            return true;
        }
    }

    // رویدادها
    password.addEventListener('input', function() {
        checkPasswordStrength(this.value);
        validateMatch();
    });
    
    confirmPassword.addEventListener('input', validateMatch);
    
    // جلوگیری از ارسال فرم در صورت عدم تطابق
    document.getElementById('resetForm').addEventListener('submit', function(e) {
        if (!validateMatch()) {
            e.preventDefault();
            matchError.classList.remove('hidden');
            confirmPassword.focus();
        }
    });

    // نمایش/مخفی کردن رمز عبور
    function togglePassword(inputId, btnId) {
        const input = document.getElementById(inputId);
        const btn = document.getElementById(btnId);
        btn.addEventListener('click', function() {
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            this.innerHTML = type === 'password' ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
        });
    }
    
    togglePassword('password', 'togglePassword');
    togglePassword('confirm_password', 'toggleConfirmPassword');
});
</script>
{% endblock %}
