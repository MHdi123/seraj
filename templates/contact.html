{% extends "base.html" %}

{% block title %}تماس با ما - سِراج{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- هدر -->
        <div class="bg-gradient-to-r from-emerald-600 to-teal-600 px-6 py-8 text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white/20 rounded-full mb-4">
                <i class="fas fa-envelope text-white text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white">تماس با ما</h2>
            <p class="text-emerald-100 mt-2">ما مشتاق شنیدن نظرات شما هستیم</p>
        </div>

        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="text-center p-4 bg-gray-50 rounded-xl">
                    <i class="fas fa-phone text-emerald-600 text-2xl mb-2"></i>
                    <h3 class="font-bold text-gray-800">تلفن تماس</h3>
                    <p class="text-gray-600">09117622885</p>
                </div>
                <div class="text-center p-4 bg-gray-50 rounded-xl">
                    <i class="fas fa-envelope text-emerald-600 text-2xl mb-2"></i>
                    <h3 class="font-bold text-gray-800">ایمیل</h3>
                    <p class="text-gray-600">info@seraj.com</p>
                </div>
            </div>
            
            <form method="POST">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">نام و نام خانوادگی</label>
                    <input type="text" name="name" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">ایمیل</label>
                    <input type="email" name="email" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">پیام</label>
                    <textarea name="message" rows="5" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500" required></textarea>
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition">
                    ارسال پیام
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
